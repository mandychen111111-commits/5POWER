<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHI-BIO 尖端五行能量互動體驗</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(255,255,255,1); box-shadow: 0 0 20px rgba(255,255,255,0.5); }
            50% { border-color: rgba(255,255,255,0.2); box-shadow: 0 0 5px rgba(255,255,255,0.1); }
        }
        .animate-fade-in { animation: fade-in 1s ease-out forwards; }
        .animate-fade-in-up { animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-spin-slow { animation: spin-slow 20s linear infinite; }
        .animate-pulse-border { animation: pulse-border 2s infinite; }
        body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 模擬 Lucide 圖示組件
        const Icon = ({ name, className }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const ELEMENTS_DATA = {
            metal: {
                id: 'metal', name: '金', title: '香檳金', attribute: '豐富能量',
                gradient: 'from-[#EAC075] to-[#B8860B]',
                description: '香檳金蘊含穩定且豐富的能量，適合需要找回自信、閃耀動人光采的時刻。它能優化肌膚氣色，讓您的每一天都如同晨曦般明亮奪目。',
                ritual: '晨間賦活儀式：針對 T 字部位與眼周輕壓，開啟一天的神采奕奕。',
                tips: ['提升自信氣場', '煥發臉部光采', '維持肌膚能量平衡'],
                moodMatch: ['想提升自信', '需要重要場合表現', '感覺氣色暗沉'],
                iconName: 'sparkles'
            },
            wood: {
                id: 'wood', name: '木', title: '太空灰', attribute: '生機成長',
                gradient: 'from-[#A9A9A9] to-[#2F4F4F]',
                description: '太空灰注入森林般的生機活力，象徵成長與無限可能。當您感到思緒停滯時，木的能量能幫助您找回靈活的應變力，釋放累積的負擔。',
                ritual: '工作間歇修護：輕壓太陽穴與後頸，讓緊繃的思緒重獲森林般的清新。',
                tips: ['找回內在生機', '釋放思緒壓力', '提升應變靈活性'],
                moodMatch: ['思緒卡關', '長時間使用 3C', '感覺缺乏創造力'],
                iconName: 'wind'
            },
            water: {
                id: 'water', name: '水', title: '質感黑', attribute: '流動靈活',
                gradient: 'from-[#434343] to-[#000000]',
                description: '質感黑代表著深邃的流動感，如同靜謐湖水般柔韌且具備極佳的靈活性。適合在需要深層放鬆、重整步調時使用，讓身心歸於平靜。',
                ritual: '深夜靜謐儀式：沿著下顎線條緩慢滑動，在睡前享受如同水般的柔順律動。',
                tips: ['提升律動柔軟度', '營造靜謐氛圍', '優化睡前放鬆感'],
                moodMatch: ['情緒波動大', '想要深層休息', '感覺生活步調太快'],
                iconName: 'droplets'
            },
            fire: {
                id: 'fire', name: '火', title: '幸福紅', attribute: '激情熱情',
                gradient: 'from-[#FF4D4D] to-[#8B0000]',
                description: '幸福紅點燃內心的火花，為生活注入飽滿的激情與熱量。當您感到動力不足、疲憊無光時，火的能量能協助您重新燃起對生活的熱情。',
                ritual: '重要時刻前夕：輕快點壓臉頰兩側，營造自然粉嫩的視覺健康能量。',
                tips: ['提振整體精神', '增加生活熱情', '展現豐沛生命力'],
                moodMatch: ['感覺提不起勁', '需要社交熱情', '尋求正面能量'],
                iconName: 'flame'
            },
            earth: {
                id: 'earth', name: '土', title: '焦糖棕', attribute: '穩定安全',
                gradient: 'from-[#A0522D] to-[#5D2E0B]',
                description: '焦糖棕提供穩如大地的安心感，為生活打造最堅固的平衡基石。土的能量能穩定浮躁的身心，讓您感受到踏實的支撐力。',
                ritual: '居家定錨儀式：針對耳後及頸部定點按壓，感受大地帶來的溫厚陪伴與平衡。',
                tips: ['打造安定感', '平衡生活基調', '建立肌膚健康基礎'],
                moodMatch: ['感覺漂浮不定', '尋求安全感', '需要長期穩定平衡'],
                iconName: 'mountain'
            },
            aura: {
                id: 'aura', name: '氣', title: '活力橘', attribute: '氣場輔助',
                gradient: 'from-[#FFA500] to-[#D2691E]',
                description: '活力橘是全系列的「能量增壓器」，能輔助強化各種五行氣場。它結合了現代人體工學設計，旨在點燃內在靈感，創造無死角的療癒體驗。',
                ritual: '全方位保養儀式：作為全臉掃動的開端，啟動整體的能量循環感知。',
                tips: ['全方位氣場加強', '點燃創作靈感', '營造療癒氣氛'],
                moodMatch: ['需要全方位調整', '尋求生活新鮮感', '想嘗試混合保養'],
                iconName: 'sun'
            }
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [selectedMood, setSelectedMood] = useState(null);
            const [selectedElement, setSelectedElement] = useState(null);

            const moods = [
                { id: 'tired', label: '感覺疲憊無光', icon: 'moon', target: 'fire' },
                { id: 'stressed', label: '壓力大需平靜', icon: 'droplets', target: 'water' },
                { id: 'lost', label: '缺乏靈感動力', icon: 'zap', target: 'wood' },
                { id: 'confident', label: '追求自信光采', icon: 'sparkles', target: 'metal' },
                { id: 'unstable', label: '渴望安定踏實', icon: 'mountain', target: 'earth' },
                { id: 'neutral', label: '想提升全面氣場', icon: 'sun', target: 'aura' },
            ];

            const handleMoodSelect = (mood) => {
                setSelectedMood(mood);
                setView('circle');
            };

            const handleElementSelect = (id) => {
                setSelectedElement(ELEMENTS_DATA[id]);
                setView('result');
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[650px] p-6 text-center animate-fade-in">
                    <div className="mb-12 relative">
                        <div className="w-32 h-32 rounded-full bg-blue-500/10 flex items-center justify-center border border-blue-400/20 shadow-[0_0_50px_rgba(59,130,246,0.2)]">
                            <Icon name="sparkles" className="w-14 h-14 text-blue-300 animate-pulse" />
                        </div>
                    </div>
                    <h1 className="text-4xl font-light tracking-[0.3em] mb-6 text-white">色彩療癒身心靈</h1>
                    <p className="text-blue-100/60 mb-12 max-w-md leading-relaxed tracking-wider">
                        深吸一口氣，讓能量在指尖流動。<br />
                        透過古老五行智慧，尋找此刻您最需要的命定光芒。
                    </p>
                    <button 
                        onClick={() => setView('quiz')}
                        className="group relative px-16 py-5 bg-white text-blue-900 rounded-full font-bold tracking-[0.2em] hover:bg-blue-50 transition-all duration-500 shadow-2xl hover:scale-105 active:scale-95 overflow-hidden"
                    >
                        <span className="relative z-10">開啟能量探索</span>
                    </button>
                </div>
            );

            const renderQuiz = () => (
                <div className="p-8 max-w-4xl mx-auto animate-fade-in">
                    <div className="text-center mb-16">
                        <h2 className="text-3xl font-light tracking-widest mb-4 text-white">今日的您，感覺如何？</h2>
                        <p className="text-blue-300/60 italic">聆聽內心的聲音，選擇最貼近當下的狀態...</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {moods.map((mood) => (
                            <button
                                key={mood.id}
                                onClick={() => handleMoodSelect(mood)}
                                className="group flex items-center gap-6 bg-white/5 border border-white/10 p-6 rounded-2xl hover:bg-white/10 hover:border-white/30 transition-all duration-300 text-left"
                            >
                                <div className="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-white/20 transition-colors">
                                    <Icon name={mood.icon} className="w-6 h-6 text-white" />
                                </div>
                                <span className="text-lg font-light tracking-wide text-white">{mood.label}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );

            const renderCircle = () => (
                <div className="p-6 max-w-5xl mx-auto animate-fade-in flex flex-col items-center">
                    <div className="text-center mb-8">
                        <h2 className="text-2xl font-light tracking-widest text-white">能量共振環</h2>
                        <p className="text-blue-300/50 mt-2">根據您的狀態，我們推薦「{ELEMENTS_DATA[selectedMood.target].name}」屬性能量</p>
                    </div>
                    <div className="relative w-80 h-80 md:w-[500px] md:h-[500px] flex items-center justify-center mt-12 mb-12">
                        <button 
                           onClick={() => handleElementSelect('aura')}
                           className={`z-20 w-32 h-32 md:w-44 md:h-44 rounded-full bg-gradient-to-br ${ELEMENTS_DATA.aura.gradient} flex flex-col items-center justify-center shadow-[0_0_40px_rgba(255,140,0,0.4)] hover:scale-110 transition-transform border-4 border-white/20 group`}
                        >
                            <span className="text-3xl font-bold mb-1 text-white">{ELEMENTS_DATA.aura.name}</span>
                            <span className="text-[10px] tracking-widest text-white opacity-70 group-hover:opacity-100 uppercase">氣場輔助</span>
                        </button>
                        <div className="absolute inset-0 border-2 border-dashed border-white/10 rounded-full animate-spin-slow"></div>
                        {Object.entries(ELEMENTS_DATA).filter(([k]) => k !== 'aura').map(([key, data], index) => {
                            const angle = (index * (360 / 5)) - 90;
                            const radius = window.innerWidth > 768 ? 200 : 130;
                            const x = Math.cos((angle * Math.PI) / 180) * radius;
                            const y = Math.sin((angle * Math.PI) / 180) * radius;
                            const isRecommended = selectedMood?.target === key;
                            return (
                                <div key={key} style={{ transform: `translate(${x}px, ${y}px)` }} className="absolute z-10 group">
                                    <button
                                        onClick={() => handleElementSelect(key)}
                                        className={`w-20 h-20 md:w-28 md:h-28 rounded-full bg-gradient-to-br ${data.gradient} flex flex-col items-center justify-center shadow-lg transition-all duration-500 hover:scale-125 hover:rotate-6 border-2 ${isRecommended ? 'border-white animate-pulse-border shadow-[0_0_20px_white]' : 'border-white/10'}`}
                                    >
                                        <span className="text-2xl font-bold text-white">{data.name}</span>
                                        <span className="text-[8px] tracking-tight text-white opacity-60 mt-1 uppercase">{data.title}</span>
                                    </button>
                                    {isRecommended && (
                                        <div className="absolute -top-8 left-1/2 -translate-x-1/2 whitespace-nowrap bg-white text-blue-900 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-tighter">最合適</div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            const renderResult = () => (
                <div className="p-8 max-w-5xl mx-auto animate-fade-in-up">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start py-6">
                        <div className="flex flex-col items-center space-y-12">
                            <div className="relative">
                                <div className={`w-14 h-[400px] rounded-full bg-gradient-to-b ${selectedElement.gradient} shadow-[0_30px_60px_rgba(0,0,0,0.5)] relative z-10 border border-white/20 overflow-hidden`}>
                                    <div className="absolute top-4 left-1/2 -translate-x-1/2 w-4 h-4 rounded-full bg-white/30 blur-[1px]"></div>
                                    <div className="absolute bottom-8 left-1/2 -translate-x-1/2 w-8 h-8 rounded-full bg-black/50 blur-sm"></div>
                                </div>
                                <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 rounded-full bg-gradient-to-br ${selectedElement.gradient} opacity-20 blur-[100px] animate-pulse`}></div>
                            </div>
                        </div>
                        <div className="space-y-10">
                            <header className="border-b border-white/10 pb-8 text-white">
                                <div className="flex items-center gap-4 mb-4">
                                    <span className={`w-12 h-12 rounded-full bg-gradient-to-br ${selectedElement.gradient} flex items-center justify-center font-bold text-xl border border-white/30 shadow-lg`}>
                                        {selectedElement.name}
                                    </span>
                                    <div>
                                        <h3 className="text-blue-300 text-sm font-medium tracking-widest uppercase mb-1">屬性能量：{selectedElement.attribute}</h3>
                                        <h2 className="text-5xl font-light tracking-tight">{selectedElement.title}</h2>
                                    </div>
                                </div>
                                <p className="text-xl text-blue-50/80 font-light leading-relaxed italic">「{selectedElement.description}」</p>
                            </header>
                            <section className="bg-white/5 rounded-3xl p-8 space-y-6 border border-white/10">
                                <h4 className="flex items-center gap-3 text-lg font-medium tracking-widest text-blue-300">
                                    <Icon name="brain-circuit" className="w-5 h-5" /> 專屬能量儀式
                                </h4>
                                <div className="bg-blue-900/20 p-4 rounded-xl border-l-4 border-blue-400">
                                    <p className="text-blue-100 leading-relaxed text-sm">{selectedElement.ritual}</p>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    {selectedElement.tips.map((tip, idx) => (
                                        <div key={idx} className="flex items-center gap-4 group">
                                            <Icon name="check-circle-2" className="w-4 h-4 text-blue-400" />
                                            <span className="text-blue-50/70 text-sm tracking-wide">{tip}</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                            <div className="flex flex-col sm:flex-row gap-4 pt-6">
                                <button className="flex-1 py-5 bg-white text-blue-950 rounded-2xl font-bold tracking-[0.2em] shadow-xl hover:shadow-blue-500/20 hover:-translate-y-1 transition-all">立即體驗這份能量</button>
                                <button onClick={() => setView('quiz')} className="px-8 py-5 border border-white/20 rounded-2xl hover:bg-white/10 transition-all flex items-center justify-center gap-2 text-white">
                                    <Icon name="rotate-ccw" className="w-5 h-5 text-blue-300" />
                                    <span className="text-sm tracking-widest uppercase">重新測量</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <div className="fixed inset-0 pointer-events-none">
                        <div className="absolute top-[10%] left-[10%] w-1 h-1 bg-white rounded-full animate-pulse opacity-20"></div>
                        <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-600/5 rounded-full blur-[150px]"></div>
                    </div>
                    <header className="relative z-20 flex justify-between items-center p-8 md:px-16">
                        <div className="flex flex-col">
                            <div className="text-white font-black tracking-tighter text-2xl">CHI<span className="text-blue-400">∙</span>BIO</div>
                        </div>
                    </header>
                    <main className="relative z-10">
                        {view === 'home' && renderHome()}
                        {view === 'quiz' && renderQuiz()}
                        {view === 'circle' && renderCircle()}
                        {view === 'result' && renderResult()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
